<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tarjeta Digital | LA CASA GPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .tarjeta {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px 20px;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: #f5f5f5;
            border-radius: 30px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .sin-imagen {
            font-size: 48px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .nombre-negocio {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .nombre-persona {
            color: #ccc;
            font-size: 16px;
        }
        .contenido {
            padding: 24px;
        }
        .info-item {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s;
        }
        .info-item:hover {
            transform: scale(1.01);
            background: #e9ecef;
        }
        .info-icono {
            font-size: 24px;
            min-width: 40px;
            text-align: center;
        }
        .info-texto {
            flex: 1;
            word-break: break-word;
        }
        .info-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 4px;
        }
        .info-valor {
            font-size: 16px;
            font-weight: 500;
            color: #212529;
        }
        .botones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
        }
        .btn-whatsapp:hover {
            background: #128C7E;
            transform: scale(1.02);
        }
        .btn-llamar {
            background: #3b82f6;
            color: white;
        }
        .btn-llamar:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn-ubicacion {
            background: #ea4335;
            color: white;
        }
        .btn-ubicacion:hover {
            background: #c5221f;
            transform: scale(1.02);
        }
        .btn-web {
            background: #6c757d;
            color: white;
        }
        .btn-web:hover {
            background: #495057;
            transform: scale(1.02);
        }
        .referido {
            background: #fef3c7;
            border-radius: 20px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #92400e;
            border: 1px dashed #f59e0b;
        }
        .visit-counter {
            text-align: center;
            font-size: 11px;
            color: #adb5bd;
            padding: 16px;
            border-top: 1px solid #e9ecef;
        }
        .badge {
            display: inline-block;
            background: #10b981;
            color: white;
            border-radius: 50px;
            padding: 4px 12px;
            font-size: 11px;
            margin-bottom: 10px;
        }
        @media (max-width: 480px) {
            .tarjeta { border-radius: 32px; }
            .nombre-negocio { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="tarjeta" id="tarjetaApp">
        <div class="header">
            <div class="logo" id="logoContainer">
                <img id="logoImg" src="portada.jpg" alt="Logo" style="display:none;" onerror="this.style.display='none'; document.getElementById('logoSinImagen').style.display='flex';">
                <div id="logoSinImagen" class="sin-imagen" style="display:flex;">📍</div>
            </div>
            <div class="nombre-negocio" id="nombreNegocio">LA CASA GPS</div>
            <div class="nombre-persona" id="nombrePersona">Villavicencio</div>
        </div>
        <div class="contenido">
            <div class="badge">✨ Tarjeta digital inteligente</div>
            
            <div id="infoContainer"></div>

            <div class="botones" id="botonesContainer"></div>

            <div class="referido">
                🔗 <strong>¿Te enviaron esta tarjeta?</strong><br>
                Cuando contactes, menciona el código: <span id="codigoRef" style="background:white; padding:2px 8px; border-radius:20px; font-family:monospace;">GPS-REF001</span>
            </div>
        </div>
        <div class="visit-counter" id="visitCounter">
            👁️ Tarjeta profesional | Compártela fácil
        </div>
    </div>

    <script>
        // ============================================================
        // 📍 DATOS REALES DE LA CASA GPS
        // ============================================================
        const datosNegocio = {
            nombreNegocio: "LA CASA GPS",
            nombreResponsable: "Villavicencio",
            whatsapp: "573028172176",  // Número actualizado
            telefonoLlamada: "573028172176",
            direccion: "Cl. 35, Av. Catama #17A-37, Villavicencio, Meta",
            facebook: "https://www.facebook.com/share/18Sd3j2sao/",
            instagram: "",
            sitioWeb: "",
            codigoReferido: "GPS-" + Math.random().toString(36).substring(2, 8).toUpperCase()
        };
        
        // Contador de visitas
        let visitas = localStorage.getItem("visitas_" + datosNegocio.codigoReferido);
        if (visitas === null) {
            visitas = 1;
        } else {
            visitas = Number(visitas) + 1;
        }
        localStorage.setItem("visitas_" + datosNegocio.codigoReferido, visitas);
        
        // Renderizar todo
        function renderTarjeta() {
            document.getElementById("nombreNegocio").innerText = datosNegocio.nombreNegocio;
            document.getElementById("nombrePersona").innerHTML = datosNegocio.nombreResponsable;
            document.getElementById("codigoRef").innerText = datosNegocio.codigoReferido;
            
            const infoContainer = document.getElementById("infoContainer");
            infoContainer.innerHTML = "";
            
            // Dirección
            if (datosNegocio.direccion) {
                infoContainer.innerHTML += `
                    <div class="info-item">
                        <div class="info-icono">📍</div>
                        <div class="info-texto">
                            <div class="info-label">Dirección</div>
                            <div class="info-valor">${datosNegocio.direccion}</div>
                        </div>
                    </div>
                `;
            }
            
            // Botones
            const botonesContainer = document.getElementById("botonesContainer");
            botonesContainer.innerHTML = "";
            
            // WhatsApp
            const msgWhatsApp = `Hola ${datosNegocio.nombreNegocio}, vi tu tarjeta digital. Me interesa. Código: ${datosNegocio.codigoReferido}`;
            botonesContainer.innerHTML += `<a href="https://wa.me/${datosNegocio.whatsapp}?text=${encodeURIComponent(msgWhatsApp)}" class="btn btn-whatsapp" target="_blank">💬 WhatsApp</a>`;
            
            // Llamar
            botonesContainer.innerHTML += `<a href="tel:${datosNegocio.telefonoLlamada}" class="btn btn-llamar">📞 Llamar ahora</a>`;
            
            // Ubicación (Google Maps)
            const urlMaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(datosNegocio.direccion)}`;
            botonesContainer.innerHTML += `<a href="${urlMaps}" class="btn btn-ubicacion" target="_blank">📍 Ver ubicación</a>`;
            
            // Facebook
            if (datosNegocio.facebook) {
                botonesContainer.innerHTML += `<a href="${datosNegocio.facebook}" class="btn btn-web" target="_blank">📘 Facebook</a>`;
            }
            
            document.getElementById("visitCounter").innerHTML = `👁️ ${visitas} vistas a esta tarjeta | Código: ${datosNegocio.codigoReferido}`;
        }
        
        renderTarjeta();
        
        // Función para actualizar datos después
        window.actualizarTarjeta = function(nuevosDatos) {
            Object.assign(datosNegocio, nuevosDatos);
            renderTarjeta();
        };
        
        console.log("🎯 Código de referido:", datosNegocio.codigoReferido);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Visual - Guía Digital de Cúcuta</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0b1c3a;font-family:'Segoe UI',Arial,sans-serif;color:#fff;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        .header{text-align:center;margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid rgba(251,191,36,0.3);}
        .header h1{color:#fbbf24;font-size:2.2rem;}
        .header p{color:#94a3b8;font-size:1rem;margin-top:5px;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:25px;}
        .card{background:#112b4f;border-radius:20px;overflow:hidden;transition:0.3s;border:1px solid #1e3a5f;cursor:pointer;display:flex;flex-direction:column;}
        .card:hover{transform:translateY(-6px);border-color:#fbbf24;box-shadow:0 12px 30px rgba(251,191,36,0.2);}
        .card .img-wrap{width:100%;padding-top:56.25%;position:relative;background:#0a1a2e;overflow:hidden;}
        .card .img-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;transition:0.3s;}
        .card:hover .img-wrap img{transform:scale(1.02);}
        .card .info{padding:14px 16px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center;}
        .card .info .nombre{font-weight:700;color:#fff;font-size:1rem;letter-spacing:0.3px;}
        .card .info .link{color:#fbbf24;font-size:0.75rem;text-decoration:none;margin-top:4px;font-weight:500;}
        .card .info .link:hover{text-decoration:underline;}
        .footer{text-align:center;color:#64748b;font-size:0.75rem;margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);}
        .footer a{color:#fbbf24;text-decoration:none;}
        .contador{display:inline-block;background:#fbbf24;color:#0b1c3a;padding:4px 14px;border-radius:30px;font-weight:700;font-size:0.85rem;margin-top:6px;}
        @media(max-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🐙 Directorio de Negocios</h1>
        <p>Negocios que ya confían en la Guía Digital de Cúcuta</p>
        <span class="contador" id="contadorNegocios">0 negocios</span>
    </div>

    <div class="grid" id="directorioGrid"></div>

    <div class="footer">
        Guía Digital de Cúcuta · <a href="https://guia-digital.com">guia-digital.com</a> · Conecta · Comparte · Construye
    </div>
</div>

<script>
    const negocios = [
        { nombre: "AUTOCUCUTA", portada: "autocucuta-portada.jpg", enlace: "autocucuta.html" },
        { nombre: "AUTOREPUESTOS RR", portada: "autorepuestos-rr-portada.jpg", enlace: "autorepuestos-rr.html" },
        { nombre: "CACHAPAS LOS PANAS", portada: "portada-cachapas-los-panas.jpg", enlace: "cachapas-los-panas.html" },
        { nombre: "CONE TORRADO", portada: "portada-cone-torrado.jpg", enlace: "cone-torrado.html" },
        { nombre: "EL SABOR DE DOÑA ROSA", portada: "portada-el-sabor-de-doña-rosa.jpg", enlace: "el-sabor-de-doña-rosa-cucuta.html" },
        { nombre: "EL SUIZO", portada: "portada-el-suizo.jpg", enlace: "el-suizo.html" },
        { nombre: "ESTACION CALIDAD", portada: "estacion-calidad-portada.png", enlace: "estacion-calidad.html" },
        { nombre: "GOMAS Y SOPORTES", portada: "gomas-y-soportes-portada.jpg", enlace: "gomas-y-soportes.html" },
        { nombre: "GUSTAVO ROJAS", portada: "portada-gustavo.jpg", enlace: "gustavo-rojas.html" },
        { nombre: "HECTOR QUINTERO", portada: "portada-hector.jpg", enlace: "hector-quintero.html" },
        { nombre: "JHON RUBIO", portada: "portada-jhon-rubio.jpg", enlace: "jhon-rubio.html" },
        { nombre: "JULIAN BETANCUR", portada: "julian-betancur-portada.jpg", enlace: "julian-betancur.html" },
        { nombre: "KATA", portada: "portada-kata.jpg", enlace: "kata.html" },
        { nombre: "LLANTAS DON MANUEL", portada: "portada-llantas-donmanuel.jpg", enlace: "llantas-donmanuel.html" },
        { nombre: "LUIS DIAZ", portada: "portada-luis1.jpg", enlace: "luis-diaz.html" },
        { nombre: "MATRIZ COMUNICACIONES", portada: "portada-matriz.jpg", enlace: "matriz-comunicaciones.html" },
        { nombre: "NGE TRANSPORTES", portada: "portada-nge-transportes.jpg", enlace: "nge-transportes.html" },
        { nombre: "PEDRO OBANDO", portada: "pedro.jpg", enlace: "pedro-obando.html" },
        { nombre: "REFRIGERACION MI BENDICION", portada: "portada-refrigeracion.jpg", enlace: "refrigeracion-mi-bendicion.html" },
        { nombre: "REPUESTOS EXPRESS", portada: "portada-repuestos-express.jpg", enlace: "repuestos-express.html" },
        { nombre: "SHADDAI", portada: "shaddai-portada.jpg", enlace: "shaddai.html" },
        { nombre: "TALLER OSAMA", portada: "portada-osama.jpg", enlace: "taller-osama.html" },
        { nombre: "TECNI GOMAS", portada: "tecni-gomas-portada.jpg", enlace: "tecni-gomas.html" },
        { nombre: "WAHL", portada: "portada-wahl.jpg", enlace: "wahl.html" }
    ];

    negocios.sort((a,b) => a.nombre.localeCompare(b.nombre));

    const grid = document.getElementById('directorioGrid');
    negocios.forEach(n => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => window.open(n.enlace, '_blank');
        card.innerHTML = `
            <div class="img-wrap">
                <img src="${n.portada}" alt="${n.nombre}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;color:#fbbf24;font-size:0.8rem;\\'>${n.nombre}</div>'">
            </div>
            <div class="info">
                <div class="nombre">${n.nombre}</div>
                <a class="link" href="${n.enlace}" target="_blank">Ver tarjeta →</a>
            </div>
        `;
        grid.appendChild(card);
    });

    document.getElementById('contadorNegocios').innerText = negocios.length + ' negocios';
</script>
</body>
</html>
